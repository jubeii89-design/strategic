name: Deploy PokerSt8ts to GitHub Pages

# Builds the static Vite app and publishes dist/ to GitHub Pages.
# Runs on pushes to main (production) and on the initial port branch so the
# site can go live before the PR is merged; also runnable on demand.
on:
  push:
    branches:
      - main
      - claude/pokersstraights-solo-port-mf2g4u
  workflow_dispatch:

# Permissions the Pages deploy action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deployment at a time; newer pushes supersede older runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # Deploy only from main (production) or a manual run. Branch pushes still run
  # the build job above to validate; they don't attempt a Pages deployment, so
  # the PR isn't marked failed while Pages is being enabled. To publish before
  # merging: enable Pages, then Actions → "Deploy PokerSt8ts to GitHub Pages" →
  # Run workflow → pick this branch.
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
