name: Deploy PokerSt8ts to GitHub Pages

# Builds the static Vite app and publishes dist/ to GitHub Pages.
# Runs on pushes to main (production) and on the initial port branch so the
# site can go live before the PR is merged; also runnable on demand.
on:
  push:
    branches:
      - main
      - claude/pokersstraights-solo-port-mf2g4u
  workflow_dispatch:

# Permissions the Pages deploy action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deployment at a time; newer pushes supersede older runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      # Creates/enables the Pages site (source = GitHub Actions) via the API,
      # so no manual Settings → Pages toggle is needed on the public repo.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # Deploys from main (production) or the port branch (to publish before the PR
  # is merged), or a manual run. After merging PR #1, the branch clause can be
  # dropped so only main deploys.
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/claude/pokersstraights-solo-port-mf2g4u' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
